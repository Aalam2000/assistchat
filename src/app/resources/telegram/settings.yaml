# src/app/resources/telegram/settings.yaml
name: "Telegram"
title: "Telegram"
description: "Telegram user-сессия (Telethon). Только подключение — логика в PROMPT."

schema:
  version: 2
  groups:
    - title: "Telegram подключение"
      fields:
        - key: creds.app_id
          label: "Telegram API ID"
          type: number
          required: true

        - key: creds.app_hash
          label: "Telegram API Hash"
          type: password
          required: true

        - key: creds.phone
          label: "Номер телефона (E.164)"
          type: string
          required: false
          help: "Используется только при первичной активации."

        - key: creds.string_session
          label: "StringSession"
          type: textarea
          required: false
          help: "Заполняется автоматически после активации."
