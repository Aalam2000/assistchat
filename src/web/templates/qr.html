<!-- src/web/templates/qr.html -->
{% extends "base.html" %}
{% block title %}QR + Logo | assistchat{% endblock %}

{% block content %}
<div class="page">
  <section class="tile">
    <div class="tile-title">QR с логотипом</div>
    <p class="tile-desc">Текст/URL для QR и логотип (PNG/TIFF). На выходе — ZIP с PNG и PDF.</p>

    <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
      <label>
        Текст / URL
        <input id="qrText" type="text" placeholder="https://amarant.world" />
      </label>
      <label>
        Логотип (PNG/TIFF)
        <input id="logoFile" type="file" accept="image/png,image/tiff" />
      </label>
    </div>

    <div class="actions mt-12">
      <button id="btnCreate" class="btn primary">СОЗДАТЬ</button>
    </div>

    <div id="status" class="mono mt-8"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/qr.js"></script>
{% endblock %}
