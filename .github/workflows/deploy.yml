# .github/workflows/deploy.yml
name: Deploy to Server

on:
  push:
    branches:
      - master

concurrency:
  group: assistchat-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 155.212.230.161 >> ~/.ssh/known_hosts

      - name: Deploy to server (PROD)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: 155.212.230.161
          username: cargo
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            APP_DIR="/var/www/assistchat"
            COMPOSE_FILE="docker-compose.prod.yml"
            
            cd "$APP_DIR"
            
            echo "[DEPLOY] update code"
            git fetch --prune origin master
            git reset --hard origin/master
            
            echo "[DEPLOY] ensure db volume exists"
            docker volume inspect assistchat_db >/dev/null 2>&1 || docker volume create assistchat_db
            
            echo "[DEPLOY] build images"
            docker compose -f "$COMPOSE_FILE" build --pull
            
            echo "[DEPLOY] up all services"
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans
            
            echo "[DEPLOY] cleanup"
            docker image prune -f
            
            echo "[DEPLOY] done"